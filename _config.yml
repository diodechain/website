# General Settings
name: Diode
title: Diode&#8482;
description: Diode enables digital sovereignty in everyday interactions.
url: https://diode.io


# Theme Settings
theme: minima
minima:
  date_format: "%b %-d, %Y"
sass:
  style: compressed
plugins:
- jekyll-feed
- jekyll-paginate
- jekyll-seo-tag
- jekyll-redirect-from
- jekyll-sitemap


# Path
path:
  images: "/assets/img/"
  styles: "/assets/css/"
  scripts: "/assets/js/"
  favicon: "/assets/favicon/"


# Navigation
nav:
- title: Products
  url: "/products/"
  sub:
  - title: Diode Collab
    url: "/products/collab/"
  - title: CLI
    url: "/products/cli/"
  - title: Vault
    url: "/products/vault/"
  - title: Network
    url: "/products/network/"
#- title: Use Cases
#  url: "/usecases/"
- title: Docs
  url: "https://docs.diode.io/"
  target: _blank
#- title: Pricing
#  url: "/pricing/" 
- title: About Us
  url: "/about/"
  sub:
#  - title: Download
#    url: "/download/"
  - title: How it works
    url: "/how-it-works/"
#  - title: Explore the network
#    url: "https://diodenetwork.io"
#    target: _blank
  - title: Blog
    url: "/blog/"

# Other Links
links:
  download:
    title: Login
    url: "https://ztna.diode.io"
  # Diode Collab app installers (Download Center on collab.diode.io)
  collab_download:
    title: Download Diode Collab 
    url: "https://collab.diode.io/download/"
  node:
    title: Run a Node
    url: "https://network.docs.diode.io/docs/"
  terms:
    title: Terms
    url: "/terms/"
  privacy:
    title: Privacy Policy
    url: "/privacy-policy/"
  thanks:
    title: Thank You
    url: "/download/thanks/"


