# Footer
copyright: "DIODE &copy; 2026, All Rights Reserved"
security:
  title: "Secure your perimeter."
  content: "We’re governed by the belief that technology should help people thrive. It should enhance our ability to operate, create, explore, educate, and innovate - unhindered."


# Collections
collections:
  usecases:
    output: true
    permalink: /:name/

# Blog Settings
paginate: 10
paginate_path: "/blog/:num"
tags_path: "/blog/tags"
permalink: "/blog/:title"


# Sitemap excludes
defaults:
- scope:
    path: "multisig/**/*.*"
  values:
    sitemap: false
- scope:
    path: "status/**/*.*"
  values:
    sitemap: false
- scope:
    path: "assets/**/*.*"
  values:
    sitemap: false
- scope:
    path: "vesting/**/*.*"
  values:
    sitemap: false
- scope:
    path: "staging/**/*.*"
  values:
    sitemap: false
- scope:
    path: "*.*"
  values:
    image: images/diode_og.png
